name: Update Popular Posts

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-popular:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch popular posts from Umami
        env:
          UMAMI_USERNAME: ${{ secrets.UMAMI_USERNAME }}
          UMAMI_PASSWORD: ${{ secrets.UMAMI_PASSWORD }}
        run: |
          LOGIN=$(curl -s -X POST "https://u.adiaz.fyi/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$UMAMI_USERNAME\",\"password\":\"$UMAMI_PASSWORD\"}")

          TOKEN=$(echo $LOGIN | jq -r '.token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "ERROR: Failed to get token."
            exit 1
          fi

          END=$(($(date +%s) * 1000))
          START=$(($(date -d '30 days ago' +%s) * 1000))

          METRICS=$(curl -s "https://u.adiaz.fyi/api/websites/d9921361-56b2-4c33-8377-4c73cb1add2d/metrics?type=path&startAt=$START&endAt=$END&limit=20" \
            -H "Authorization: Bearer $TOKEN")

          echo $METRICS | jq '[
            .[] |
            select(.x | type == "string") |
            select(.x | startswith("/blog/")) |
            select(.x | endswith("/")) |
            select(.x | split("/") | length == 4) |
            .x | split("/")[2]
          ] | .[0:5]' > src/data/popular.json

      - name: Commit updated popular.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/popular.json
          git diff --staged --quiet || git commit -m "Update popular posts"
          git push