name: Update Popular Posts

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-popular:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch popular posts from Umami
        env:
          UMAMI_USERNAME: ${{ secrets.UMAMI_USERNAME }}
          UMAMI_PASSWORD: ${{ secrets.UMAMI_PASSWORD }}
        run: |
          LOGIN=$(curl -s -X POST "https://u.adiaz.fyi/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$UMAMI_USERNAME\",\"password\":\"$UMAMI_PASSWORD\"}")

          echo "=== LOGIN RESPONSE ==="
          echo $LOGIN

          TOKEN=$(echo $LOGIN | jq -r '.token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "ERROR: Failed to get token. Login response above."
            exit 1
          fi

          echo "=== TOKEN ACQUIRED ==="

          END=$(date +%s000)
          START=$(date -d '30 days ago' +%s000)

          METRICS=$(curl -s "https://u.adiaz.fyi/api/websites/d9921361-56b2-4c33-8377-4c73cb1add2d/metrics?type=url&startAt=$START&endAt=$END&limit=20" \
            -H "Authorization: Bearer $TOKEN")

          echo "=== RAW METRICS ==="
          echo $METRICS | jq '.'

          echo "=== BLOG URLS ONLY ==="
          echo $METRICS | jq '[.[] | select(.x | type == "string") | select(.x | startswith("/blog/"))]'

          echo "=== AFTER TRAILING SLASH FILTER ==="
          echo $METRICS | jq '[.[] | select(.x | type == "string") | select(.x | startswith("/blog/")) | select(.x | endswith("/"))]'

          echo "=== AFTER LENGTH FILTER ==="
          echo $METRICS | jq '[.[] | select(.x | type == "string") | select(.x | startswith("/blog/")) | select(.x | endswith("/")) | select(.x | split("/") | length == 4)]'

      - name: Commit updated popular.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/popular.json
          git diff --staged --quiet || git commit -m "Update popular posts"
          git push