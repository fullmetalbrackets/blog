name: Send Webmentions

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-webmentions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Send webmentions via webmention.app
        run: |
          echo "🔍 Checking entire site for outgoing webmentions..."
          curl -X POST https://webmention.app/check \
            -d "url=https://yourdomain.com/sitemap.xml" \
            -d "token=${{ secrets.WEBMENTION_APP_TOKEN }}"
          echo "✅ Webmention check complete"