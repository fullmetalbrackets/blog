name: Notify Pushover on Build Success
on:
  push:
    branches:
      - '*'
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Wait for Cloudflare Pages Build
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/blog/deployments" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              | jq -r '.result[0].latest_stage.status')
            echo "Attempt $i/20 - Status: $STATUS"
            if [ "$STATUS" = "success" ]; then exit 0; fi
            if [ "$STATUS" = "failure" ]; then exit 1; fi
            sleep 30
          done
          echo "Timed out waiting for deployment"
          exit 1

      - name: Send Pushover Notification
        run: |
          curl -s \
            -F "token=${{ secrets.PUSHOVER_TOKEN }}" \
            -F "user=${{ secrets.PUSHOVER_USER }}" \
            -F "message=✅ Cloudflare Pages build on [${{ github.ref_name }}] was successful!" \
            -F "title=Build Success" \
            https://api.pushover.net/1/messages.json

      - name: Send Pushover Failure Notification
        if: failure()
        run: |
          curl -s \
            -F "token=${{ secrets.PUSHOVER_TOKEN }}" \
            -F "user=${{ secrets.PUSHOVER_USER }}" \
            -F "message=❌ Cloudflare Pages build on [${{ github.ref_name }}] FAILED!" \
            -F "title=Build Failed" \
            -F "priority=1" \
            https://api.pushover.net/1/messages.json