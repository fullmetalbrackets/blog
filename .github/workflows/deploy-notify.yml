name: Notify Pushover on Build Success
on:
  push:
    branches:
      - '*'
jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Wait for Cloudflare Pages Build
        run: |
          # Give CF Pages time to register the new deployment
          echo "Waiting 20s for Cloudflare to register deployment..."
          sleep 20

          for i in $(seq 1 10); do
            RESPONSE=$(curl -s -X GET \
              "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/blog/deployments" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}")

            # Match the deployment for THIS specific commit
            STATUS=$(echo "$RESPONSE" | jq -r \
              --arg sha "${{ github.sha }}" \
              '.result[] | select(.deployment_trigger.metadata.commit_hash == $sha) | .latest_stage.status' \
              | head -1)

            echo "Attempt $i/10 - Commit: ${{ github.sha }} - Status: ${STATUS:-not found yet}"

            if [ "$STATUS" = "success" ]; then exit 0; fi
            if [ "$STATUS" = "failure" ]; then exit 1; fi
            sleep 30
          done

          echo "Timed out waiting for deployment (10 minutes)"
          exit 1

      - name: Send Pushover Notification
        run: |
          curl -s \
            -F "token=${{ secrets.PUSHOVER_TOKEN }}" \
            -F "user=${{ secrets.PUSHOVER_USER }}" \
            -F "message=✅ Cloudflare Pages build on [${{ github.ref_name }}] was successful!" \
            -F "title=Build Success" \
            https://api.pushover.net/1/messages.json

      - name: Send Pushover Failure Notification
        if: failure()
        run: |
          curl -s \
            -F "token=${{ secrets.PUSHOVER_TOKEN }}" \
            -F "user=${{ secrets.PUSHOVER_USER }}" \
            -F "message=❌ Cloudflare Pages build on [${{ github.ref_name }}] FAILED!" \
            -F "title=Build Failed" \
            -F "priority=1" \
            https://api.pushover.net/1/messages.json